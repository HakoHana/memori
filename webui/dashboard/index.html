<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>memori Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./i18n.js"></script>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-brand">Memori</div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-page="graph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><circle cx="5" cy="5" r="2"/><line x1="8.5" y1="9.5" x2="17" y2="6"/><line x1="8.5" y1="14.5" x2="17" y2="18"/><line x1="15" y1="7" x2="6.5" y2="11.5"/></svg>
            <span data-i18n="nav.graph">知识图谱</span>
          </button>
          <button class="nav-item" data-page="memories">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
            <span data-i18n="nav.memory">记忆管理</span>
          </button>
          <button class="nav-item" data-page="recall">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span data-i18n="nav.recall">召回测试</span>
          </button>
          <button class="nav-item" data-page="persons">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/><circle cx="17" cy="8" r="2.5"/><path d="M21 16c0-1.66-3.33-3-6-3"/></svg>
            <span data-i18n="nav.persons">用户画像</span>
          </button>
          <button class="nav-item" data-page="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span data-i18n="nav.settings">系统配置</span>
          </button>
        </nav>
        <div class="sidebar-divider"></div>
        <div class="sidebar-footer">
          <button class="nav-item" id="theme-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon-dark"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon-light" class="hidden"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2m-6.93-15.07 1.41 1.41m11.04 11.04 1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <span>主题</span>
          </button>
        </div>
      </aside>
      <main class="main-content">
        <!-- Page: Graph -->
        <section class="page active" id="page-graph">
          <header class="page-header">
            <span class="page-title">知识图谱</span>
            <div class="page-actions">
              <button class="btn btn-secondary btn-sm" id="graph-overview-btn">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                <span>概览</span>
              </button>
            </div>
          </header>
          <div class="page-body" style="display:flex;flex-direction:column">
            <div class="stat-pills" id="graph-stat-pills">
              <div class="stat-pill"><div class="stat-pill-value" id="gs-total">--</div><div class="stat-pill-label">记忆数</div></div>
              <div class="stat-pill"><div class="stat-pill-value" id="gs-nodes">--</div><div class="stat-pill-label">节点</div></div>
              <div class="stat-pill"><div class="stat-pill-value" id="gs-edges">--</div><div class="stat-pill-label">关系</div></div>
            </div>
            <div class="graph-canvas-container" style="flex:1">
              <div class="graph-canvas-state" id="graph-canvas-state">加载图谱概览...</div>
              <div id="graph-canvas" class="graph-canvas"></div>
            </div>
            <div class="graph-legend" id="graph-legend"></div>
            <div class="graph-toolbar">
              <input type="text" id="graph-query-input" class="input" placeholder="搜索实体、话题或记忆..." />
              <button class="btn btn-primary btn-sm" id="graph-search-btn">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <span>搜索</span>
              </button>
              <button class="btn btn-secondary btn-sm" id="graph-focus-btn">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4m-6.93-15.07 2.83 2.83m8.48 8.48 2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48 2.83-2.83"/></svg>
                <span>聚焦</span>
              </button>
            </div>
          </div>
        </section>
        <!-- Page: Memories -->
        <section class="page" id="page-memories">
          <header class="page-header">
            <span class="page-title">记忆管理</span>
          </header>
          <div class="page-body">
            <div class="filter-bar">
              <input type="text" id="mem-keyword" class="input" placeholder="搜索关键词或 ID..." />
              <select id="mem-year" class="select input" style="width:auto"><option value="">年份</option></select>
              <select id="mem-month" class="select input" style="width:auto">
                <option value="">月份</option>
                <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option>
                <option value="04">4月</option><option value="05">5月</option><option value="06">6月</option>
                <option value="07">7月</option><option value="08">8月</option><option value="09">9月</option>
                <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
              </select>
              <select id="mem-page-size" class="select input" style="width:auto">
                <option value="20">20条/页</option>
                <option value="50" selected>50条/页</option>
                <option value="100">100条/页</option>
              </select>
            </div>
            <div class="table-container">
              <div class="table-scroll" id="memories-scroll">
              <table class="data-table" id="memories-table">
                <thead>
                  <tr>
                    <th class="cell-check"><input type="checkbox" id="mem-select-page" /></th>
                    <th class="cell-id">ID</th>
                    <th class="cell-summary">摘要</th>
                    <th class="cell-type">类型</th>
                    <th class="cell-importance">重要度</th>
                    <th class="cell-status">状态</th>
                    <th class="cell-created">时间</th>
                  </tr>
                </thead>
                <tbody id="memories-body">
                  <tr><td colspan="7" class="table-empty">暂无数据</td></tr>
                </tbody>
              </table>
              </div>
              <div class="pagination">
                <div class="pagination-controls">
                  <button class="btn btn-sm btn-ghost" id="mem-prev" disabled>上一页</button>
                  <span class="pagination-info" id="mem-pagination-info">第 1/1 页 · 共 0 条</span>
                  <button class="btn btn-sm btn-ghost" id="mem-next" disabled>下一页</button>
                </div>
              </div>
            </div>
          </div>
          <div class="batch-bar" id="batch-bar">
            <span class="batch-bar-count" id="batch-count">已选 0 条</span>
            <div class="batch-bar-actions">
              <button class="btn btn-sm btn-danger" id="batch-delete">删除选中</button>
            </div>
            <button class="btn btn-sm btn-ghost" id="batch-clear">清空</button>
          </div>
        </section>
        <!-- Page: Recall -->
        <section class="page" id="page-recall">
          <header class="page-header">
            <span class="page-title">召回测试</span>
          </header>
          <div class="page-body">
            <div class="recall-form-section">
              <textarea id="recall-query" class="input textarea" rows="3" placeholder="输入查询语句测试记忆检索..."></textarea>
              <div class="recall-form-row">
                <div class="recall-form-field" style="max-width:200px">
                  <label class="recall-form-label">结果数 (k)</label>
                  <div class="slider-group">
                    <input type="range" id="recall-k" min="1" max="50" value="5" />
                    <span class="slider-value" id="recall-k-value">5</span>
                  </div>
                </div>
                <button class="btn btn-primary" id="recall-search-btn">执行召回</button>
              </div>
            </div>
            <div class="recall-results-header hidden" id="recall-stats">
              <span id="recall-count-text">0 条结果</span>
            </div>
            <div id="recall-results"></div>
          </div>
        </section>
        <!-- Page: System -->
        <!-- Page: Persons -->
        <section class="page" id="page-persons">
          <header class="page-header">
            <span class="page-title" data-i18n="nav.persons">用户画像</span>
            <div class="page-actions">
              <div class="persona-search-wrapper">
                <input type="text" id="persona-search" class="input input-sm" placeholder="" data-i18n-placeholder="persons.searchPh" />
              </div>
            </div>
          </header>
          <div class="page-body">
            <div class="persona-stats" id="persona-stats">
              <span id="persona-count" data-i18n="persons.count" data-i18n-args="0">共 0 个用户</span>
            </div>
            <div class="persona-grid" id="persona-grid">
              <div class="persona-empty" data-i18n="common.loading">加载中...</div>
            </div>
          </div>
        </section>
        <!-- Page: Settings -->
        <section class="page" id="page-settings">
          <header class="page-header">
            <span class="page-title">系统配置</span>
          </header>
          <div class="page-body" id="settings-body"></div>
        </section>
      </main>
    </div>
    <!-- Peek Panel -->
    <div class="peek-overlay" id="peek-overlay"></div>
    <aside class="peek-panel" id="peek-panel">
      <div class="peek-header">
        <div>
          <div id="peek-badge"></div>
          <div class="peek-title" id="peek-title">--</div>
        </div>
        <button class="peek-close" id="peek-close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="peek-body" id="peek-body"></div>
    </aside>
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    <script src="./graph-2d.js"></script>
    <script src="./graph-ui.js"></script>
    <script src="./settings.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
