<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">🧠 Memory</div>
    <nav>
      <button class="nav-item active" data-page="graph"><span class="nav-icon">🕸</span> 知识图谱</button>
      <button class="nav-item" data-page="memories"><span class="nav-icon">📖</span> 记忆管理</button>
      <button class="nav-item" data-page="persona"><span class="nav-icon">👤</span> 用户画像</button>
      <button class="nav-item" data-page="system"><span class="nav-icon">⚙️</span> 系统</button>
    </nav>
  </aside>
  <main class="main">
    <section class="page active" id="page-graph">
      <header><h2>🕸 知识图谱</h2>
        <div class="toolbar">
          <input id="graph-query" placeholder="搜索节点...">
          <button onclick="searchGraph()">搜索</button>
          <button onclick="loadGraphOverview()">概览</button>
        </div>
      </header>
      <div class="stats-bar" id="graph-stats"></div>
      <div class="graph-wrap">
        <div class="canvas-container" id="canvas-container"><svg id="graph-svg"></svg></div>
        <div class="graph-side" id="graph-detail"><div class="detail-placeholder">点击节点查看详情</div></div>
      </div>
      <div class="legend" id="graph-legend"></div>
    </section>

    <section class="page" id="page-memories">
      <header><h2>📖 记忆管理</h2>
        <div class="toolbar">
          <input id="mem-search" placeholder="搜索ID或关键词..." onkeyup="searchMemories()">
          <select id="mem-type-filter" onchange="searchMemories()">
            <option value="">全部类型</option>
            <option value="episodic">📌 事件</option>
            <option value="factual">📖 知识</option>
            <option value="preference">💕 偏好</option>
            <option value="planned">🎯 约定</option>
            <option value="relational">👥 关系</option>
          </select>
          <span id="mem-count" class="count-badge"></span>
        </div>
      </header>
      <div class="table-container">
        <table class="mem-table">
          <thead>
            <tr>
              <th class="id-col">ID</th>
              <th>内容</th>
              <th class="type-col">类型</th>
              <th class="imp-col">重要度</th>
              <th class="status-col">状态</th>
              <th class="ts-col">时间</th>
            </tr>
          </thead>
          <tbody id="mem-tbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="mem-pagination"></div>
    </section>

    <section class="page" id="page-persona">
      <header><h2>👤 用户画像</h2><button onclick="savePersona()">💾 保存</button></header>
      <textarea id="persona-editor" placeholder="加载中..."></textarea>
    </section>

    <section class="page" id="page-system">
      <header><h2>⚙️ 系统</h2></header>
      <div class="sys-cards" id="sys-stats"></div>
    </section>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
