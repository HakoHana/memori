<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>memori 配置</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
       background: #f5f5f7; color: #1d1d1f; padding: 20px; }
h1 { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
.groups { display: flex; flex-direction: column; gap: 20px; max-width: 960px; }
.group { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.group h2 { font-size: 16px; font-weight: 600; color: #06c; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
.field { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
.field + .field { border-top: 1px solid #f0f0f0; }
.field label { font-size: 14px; color: #333; flex: 1; }
.field .hint { font-size: 12px; color: #999; display: block; margin-top: 2px; }
.field input, .field select { width: 240px; padding: 6px 10px; border: 1px solid #d1d1d6;
       border-radius: 8px; font-size: 14px; outline: none; transition: border .2s; }
.field input:focus, .field select:focus { border-color: #06c; }
.field input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
.actions { display: flex; gap: 12px; margin-top: 20px; }
.btn { padding: 10px 28px; border-radius: 24px; font-size: 14px; font-weight: 500;
       border: none; cursor: pointer; transition: all .2s; }
.btn-primary { background: #06c; color: #fff; }
.btn-primary:hover { background: #05a; }
.btn-secondary { background: #e8e8ed; color: #333; }
.btn-secondary:hover { background: #d1d1d6; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
         background: #1d1d1f; color: #fff; padding: 12px 24px; border-radius: 24px;
         font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.loading { text-align: center; padding: 60px; color: #999; }
.prov-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.prov-table th { background: #f5f5f7; padding: 8px 6px; text-align: left; font-weight: 600; }
.prov-table td { padding: 4px 6px; }
.prov-table input { width: 100%; padding: 6px 8px; border: 1px solid #d1d1d6; border-radius: 6px; font-size: 13px; outline: none; }
.prov-table input:focus { border-color: #06c; }
.prov-table .del { background: none; border: none; cursor: pointer; color: #999; font-size: 18px; padding: 4px; }
.prov-table .del:hover { color: #e33; }
</style>
</head>
<body>
<h1>⚙️ memori 配置</h1>
<div id="app" class="loading">加载中...</div>
<div id="toast" class="toast"></div>

<script>
const API = '/api/v1/config';

async function load() {
    const resp = await fetch(API);
    const { ok, groups } = await resp.json();
    if (!ok) { document.getElementById('app').innerHTML = '<p style="color:red">加载配置失败</p>'; return; }
    render(groups);
}

function render(groups) {
    const app = document.getElementById('app');
    app.className = 'groups';
    let html = '';
    for (const [groupName, fields] of Object.entries(groups)) {
        html += `<div class="group"><h2>${groupName}</h2>`;
        for (const field of fields) {
            const id = `cfg_${field.key}`;
            const val = field.value;
            let input = '';
            if (field.type === 'bool') {
                input = `<input type="checkbox" id="${id}" ${val ? 'checked' : ''}>`;
            } else if (field.type === 'text') {
                input = `<textarea id="${id}" rows="3" style="width:240px;padding:6px 10px;border:1px solid #d1d1d6;border-radius:8px;font-size:14px;outline:none;resize:vertical;font-family:inherit">${esc(val)}</textarea>`;
            } else if (field.type === 'select') {
                let opts = field.options.map(o =>
                    `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`
                ).join('');
                input = `<select id="${id}">${opts}</select>`;
            } else {
                input = `<input type="text" id="${id}" value="${esc(val)}">`;
            }
            const hint = field.hint ? `<span class="hint">${esc(field.hint)}</span>` : '';
            html += `<div class="field"><label>${field.label}${hint}</label>${input}</div>`;
        }
        html += '</div>';
    }

    // ── 模型提供商 ──
    html += '<div class="group"><h2>🔌 模型提供商</h2>';
    html += '<div style="font-size:13px;color:#666;margin-bottom:12px">「基础」中的主模型/判读模型 ID 需与此处的 ID 一致</div>';
    html += '<table class="prov-table"><thead><tr>';
    html += '<th style="width:18%">ID</th><th style="width:28%">API 地址</th><th style="width:28%">API Key</th><th style="width:18%">模型</th><th style="width:8%"></th>';
    html += '</tr></thead><tbody id="prov_tbody"></tbody></table>';
    html += '<button class="btn btn-secondary" onclick="addProv()" style="margin-top:8px">+ 添加</button>';
    html += '</div>';

    html += `<div class="actions">
        <button class="btn btn-primary" onclick="save()">💾 保存全部</button>
        <button class="btn btn-secondary" onclick="load()">↻ 重置</button>
    </div>`;
    app.innerHTML = html;
    loadProvs();
}

function esc(v) { return String(v).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

// ── 模型提供商 ──

async function loadProvs() {
    const resp = await fetch('/api/v1/providers');
    const data = await resp.json();
    const tbody = document.getElementById('prov_tbody');
    if (!tbody) return;
    tbody.innerHTML = '';
    for (const p of data.providers || []) addProvRow(p);
}

function addProv() { addProvRow({ name: '', api_base: '', api_key: '', model: '' }); }

function addProvRow(p) {
    const tbody = document.getElementById('prov_tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td><input class="pv_name" value="${esc(p.name)}" placeholder="my-llm"></td>
        <td><input class="pv_base" value="${esc(p.api_base)}" placeholder="https://api.openai.com/v1"></td>
        <td><input class="pv_key" type="password" value="${esc(p.api_key)}"></td>
        <td><input class="pv_model" value="${esc(p.model)}" placeholder="gpt-4o"></td>
        <td><button class="del" onclick="this.closest('tr').remove()">✕</button></td>
    `;
    tbody.appendChild(tr);
}

async function save() {
    // 收集模型提供商
    const providers = [];
    document.querySelectorAll('#prov_tbody tr').forEach(tr => {
        const name = tr.querySelector('.pv_name')?.value?.trim();
        if (!name) return;
        providers.push({ name, api_base: tr.querySelector('.pv_base')?.value?.trim() || '',
            api_key: tr.querySelector('.pv_key')?.value || '', model: tr.querySelector('.pv_model')?.value?.trim() || '' });
    });
    await fetch('/api/v1/providers', {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ providers }),
    });

    // 收集配置项
    const body = {};
    document.querySelectorAll('.group').forEach(group => {
        const title = group.querySelector('h2')?.textContent || '';
        if (title.includes('模型提供商')) return;
        group.querySelectorAll('.field').forEach(field => {
            const input = field.querySelector('input, select, textarea');
            if (!input) return;
            const key = input.id.replace('cfg_', '');
            if (input.type === 'checkbox') body[key] = input.checked;
            else if (input.tagName === 'SELECT') body[key] = input.value;
            else body[key] = input.value;
        });
    });

    const resp = await fetch('/api/v1/config', {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
    });
    const data = await resp.json();
    toast(data.ok ? '✅ 已保存' : ('❌ ' + (data.error || '保存失败')));
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
}

load();
</script>
</body>
</html>
