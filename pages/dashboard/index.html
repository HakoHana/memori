<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand"> Memory</div>
    <nav>
      <button class="nav-item active" data-page="graph"><span class="nav-icon"></span> 知识图谱</button>
      <button class="nav-item" data-page="memories"><span class="nav-icon"></span> 记忆管理</button>
      <button class="nav-item" data-page="persona"><span class="nav-icon"></span> 用户画像</button>
      <button class="nav-item" data-page="system"><span class="nav-icon"></span> 系统设置</button>
    </nav>
    <div style="padding:12px 16px;border-top:1px solid var(--border);margin-top:auto">
      <button onclick="toggleTheme()" style="display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:0.85em" id="theme-btn"> 切换亮色模式</button>
    </div>
  </aside>
  <main class="main">
    <section class="page active" id="page-graph">
      <header><h2> 知识图谱</h2>
        <div class="toolbar">
          <input id="graph-query" placeholder="搜索节点...">
          <button onclick="searchGraph()">搜索</button>
          <button onclick="loadGraphOverview()">概览</button>
        </div>
      </header>
      <div class="stats-bar" id="graph-stats"></div>
      <div class="graph-wrap">
        <div class="canvas-container" id="canvas-container"><svg id="graph-svg"></svg></div>
        <div class="graph-side" id="graph-detail"><div class="detail-placeholder">点击节点查看详情</div></div>
      </div>
      <div class="legend" id="graph-legend"></div>
    </section>

    <section class="page" id="page-memories">
      <header><h2>记忆管理</h2>
        <div class="toolbar">
          <select id="mem-year" onchange="searchMemories()"><option value="">年份</option></select>
          <select id="mem-month" onchange="searchMemories()">
            <option value="">月份</option>
            <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option>
            <option value="04">4月</option><option value="05">5月</option><option value="06">6月</option>
            <option value="07">7月</option><option value="08">8月</option><option value="09">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
          </select>
          <input id="mem-search" placeholder="搜索ID或关键词..." oninput="searchMemories()">
          <span id="mem-count" class="count-badge"></span>
        </div>
      </header>
      <div class="mem-body">
        <div class="mem-table-wrap">
          <table class="mem-table">
            <thead>
              <tr>
                <th style="width:30px"><input type="checkbox" id="sel-all" onchange="toggleSelectAll()"></th>
                <th style="width:50px">ID</th>
                <th>摘要</th>
                <th style="width:120px">类型</th>
                <th style="width:60px">重要度</th>
                <th style="width:55px">状态</th>
                <th style="width:80px">创建时间</th>
              </tr>
            </thead>
            <tbody id="mem-tbody"></tbody>
          </table>
          <div style="display:flex;align-items:center;gap:8px;justify-content:center;padding:12px 0">
            <div class="pagination" id="mem-pagination" style="padding:0"></div>
            <select id="mem-page-size" onchange="memPage=1;loadMemories()" style="padding:4px 8px;font-size:0.85em">
              <option value="20">20条/页</option>
              <option value="50" selected>50条/页</option>
              <option value="100">100条/页</option>
            </select>
          </div>
        </div>
        <div class="mem-side" id="mem-side" style="display:none">
          <div class="side-header">
            <h3>记忆详情</h3>
            <div class="side-actions">
              <button onclick="editCurrentMemory()">编辑</button>
              <button onclick="deleteCurrentMemory()" style="color:var(--danger)">删除</button>
              <button onclick="closeSidePanel()" style="font-size:1.2em;background:none;border:none">X</button>
            </div>
          </div>
          <div class="side-scroll" id="side-scroll">
            <div>
              <h4>日记</h4>
              <div id="side-diary" class="side-diary">选择一条记忆查看详情</div>
            </div>
            <div>
              <h4>关键事实重要度</h4>
              <div id="side-imp" style="font-size:0.85em;color:var(--text2);padding:4px 0"></div>
            </div>
            <div>
              <h4>关键事实</h4>
              <div id="side-atoms"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="page" id="page-persona">
      <header><h2> 用户画像</h2><button onclick="savePersona()"> 保存</button></header>
      <textarea id="persona-editor" placeholder="加载中..."></textarea>
    </section>

    <section class="page" id="page-system">
      <header><h2>⚙ 系统</h2></header>
      <div class="sys-cards" id="sys-stats"></div>
    </section>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
